services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_gate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - llm_net

  flyway:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/llm_gate
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_CONNECT_RETRIES: "10"
    volumes:
      - ./infra/postgres/migrations:/flyway/sql
    command: migrate
    networks:
      - llm_net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200' <&3 || exit 1\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - llm_net

  datastore:
    build:
      context: .
      dockerfile: apps/datastore/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - datastore_kb:/app/data/knowledge_base
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - llm_net

  audit-service:
    build:
      context: .
      dockerfile: apps/audit_service/Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./data/audit:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - llm_net

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp_server/Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
      datastore:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://llm_gate_service:CHANGE_ME_service_password@postgres:5432/llm_gate
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: kb_chunks_v1
      RAG_EMBEDDING_MODEL: intfloat/multilingual-e5-small
      DATASTORE_URL: http://datastore:8002
      AUDIT_SERVICE_URL: http://audit-service:8003
    networks:
      - llm_net

  orchestrator:
    build:
      context: .
      dockerfile: apps/orchestrator/Dockerfile
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      mcp-server:
        condition: service_healthy
      datastore:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    environment:
      MCP_SERVER_URL: http://mcp-server:8001/mcp
      DATASTORE_URL: http://datastore:8002
      AUDIT_SERVICE_URL: http://audit-service:8003
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    networks:
      - llm_net

  airflow:
    build:
      context: .
      dockerfile: apps/airflow/Dockerfile
    command: standalone
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg://postgres:postgres@postgres:5432/llm_gate
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow
      ORCHESTRATOR_URL: http://orchestrator:8004
      LLM_ENRICH_SLEEP_SECONDS: ${LLM_ENRICH_SLEEP_SECONDS:-1}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/llm_gate
    volumes:
      - ./apps/airflow/src/dags:/opt/airflow/dags
      - ./apps/airflow/src/etl:/opt/airflow/etl
      - ./data:/opt/airflow/data
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      orchestrator:
        condition: service_healthy
    networks:
      - llm_net

volumes:
  datastore_kb:

networks:
  llm_net:
    driver: bridge
